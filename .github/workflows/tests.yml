name: tests

on:
  push:
  pull_request:

jobs:
  cpu-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
      - name: Run tests
        run: pytest -q
      - name: CLI smoke
        run: |
          topogpu --version
          topogpu list-cases
          topogpu cite
